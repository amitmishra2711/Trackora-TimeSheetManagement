<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White Background -->
  <rect width="64" height="64" fill="white"></rect>

  <!-- Clock Circle -->
  <circle cx="32" cy="32" r="22" stroke="black" stroke-width="4" fill="none"></circle>

  <!-- Hour Hand -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="black" stroke-width="4" stroke-linecap="round"></line>

  <!-- Minute Hand -->
  <line x1="32" y1="32" x2="44" y2="32" stroke="black" stroke-width="4" stroke-linecap="round"></line>
</svg>